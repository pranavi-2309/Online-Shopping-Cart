services:
  - type: web
    name: shopkart
    env: node
    region: singapore
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 10000
